<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Equipo 1 — Matemáticas 4° y 5°</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:#1565C0; --bluel:#1E88E5; --blued:#0D47A1;
  --bg:#E3F2FD; --card:#fff; --border:#BBDEFB;
}

/* ── LAYOUT PRINCIPAL: todo en 100dvh sin scroll ── */
html, body {
  width: 100%; height: 100dvh;
  max-height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  user-select: none;
  display: flex;
  flex-direction: column;
}

/* HEADER — compacto */
#header {
  background: var(--blue);
  padding: 8px 12px 6px;
  text-align: center;
  flex-shrink: 0;
}
#header h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 1.2rem;
  color: white;
}
#conn-status {
  font-size: .65rem;
  font-weight: 900;
  color: rgba(255,255,255,.7);
  margin-top: 1px;
}
#conn-status.ok { color: #A5D6A7; }

/* SCORE BAR — compacto */
#score-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 5px 12px 0;
  flex-shrink: 0;
}
.sc-chip {
  font-family: 'Fredoka One', cursive;
  font-size: .8rem;
  padding: 3px 12px;
  border-radius: 50px;
  color: white;
}
.sc-chip.b { background: var(--blue); }
.sc-chip.r { background: #C62828; }

/* QUESTION BOX — compacto */
#qbox {
  background: var(--card);
  margin: 5px 10px 0;
  border-radius: 12px;
  padding: 6px 12px;
  text-align: center;
  border: 2px solid var(--border);
  box-shadow: 0 2px 8px rgba(21,101,192,.1);
  flex-shrink: 0;
}
#qlabel {
  font-size: .55rem;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #90A4AE;
  margin-bottom: 1px;
}
#qtext {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.6rem, 7vw, 2.2rem);
  color: var(--blued);
  line-height: 1.1;
  transition: opacity .18s, transform .18s;
}
#qtext.fade { opacity:0; transform:scale(.92); }

/* TIMER — compacto */
#tbar-wrap {
  margin: 5px 10px 0;
  height: 6px;
  background: #ddd;
  border-radius: 99px;
  overflow: hidden;
  flex-shrink: 0;
}
#tbar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #4CAF50, #F9A825, #F44336);
  border-radius: 99px;
  transition: width 1s linear;
}
#timer-num {
  text-align: center;
  font-family: 'Fredoka One', cursive;
  font-size: .95rem;
  color: #2E7D32;
  margin-top: 2px;
  flex-shrink: 0;
}
#timer-num.ok     { color: #F9A825; }
#timer-num.urgent { color: #E53935; animation: tpulse .5s infinite alternate; }
@keyframes tpulse { to { transform: scale(1.1); } }

/* ANSWER DISPLAY — compacto */
#ans-box {
  margin: 5px 10px 0;
  background: var(--card);
  border: 2.5px solid var(--bluel);
  border-radius: 12px;
  text-align: center;
  padding: 5px 10px;
  flex-shrink: 0;
}
#ans-val {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.6rem, 7vw, 2.2rem);
  color: var(--blue);
  letter-spacing: 4px;
  line-height: 1.2;
}

/* FEEDBACK — compacto */
#fb {
  text-align: center;
  font-weight: 900;
  font-size: .8rem;
  height: 1.3em;
  padding: 1px 0;
  color: #2E7D32;
  flex-shrink: 0;
}
#fb.w { color: #E53935; }

/* NUMPAD — ocupa todo el espacio restante */
#numpad {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  padding: 4px 10px 8px;
  min-height: 0;
}
.nb {
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--card);
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.3rem, 5vw, 1.8rem);
  color: var(--blued);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(21,101,192,.1);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform .08s, background .1s;
  min-height: 0;
  /* SIN aspect-ratio: 1 para que se adapte al espacio disponible */
}
.nb:active { transform: scale(.85); background: var(--bluel); color: white; }
.nb.zero { grid-column: span 2; }
.nb.del  { background: #FFEBEE; border-color: #FFCDD2; color: #C62828; }
.nb.ok   {
  grid-column: span 3;
  background: var(--blue);
  color: white;
  border: none;
  font-size: clamp(1rem, 4vw, 1.4rem);
  box-shadow: 0 4px 14px rgba(21,101,192,.35);
}
.nb.ok:active { transform: scale(.96); background: var(--blued); }

/* Overlay fin de juego */
#over-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(13,71,161,.88);
  backdrop-filter: blur(6px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  text-align: center;
  padding: 24px;
}
#over-overlay.show { display: flex; }
#over-emoji { font-size: 3.5rem; margin-bottom: 8px; }
#over-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: white; margin-bottom: 6px; }
#over-sub   { font-size: .9rem; color: rgba(255,255,255,.75); font-weight: 800; }

/* ── PAUSA OVERLAY ── */
#pause-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:500; align-items:center; justify-content:center; flex-direction:column; }
#pause-overlay.show { display:flex; }
#pause-card { background:white; border-radius:20px; padding:30px 44px; text-align:center; }
#pause-emoji { font-size:3rem; }
#pause-title { font-family:'Fredoka One',cursive; font-size:2rem; color:#1A237E; margin-top:6px; }
#pause-sub { color:#90A4AE; font-weight:800; font-size:.9rem; margin-top:4px; }

#join-overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.58); z-index:700; backdrop-filter:blur(6px); }
#join-card { background:white; width:min(92vw,420px); border-radius:24px; padding:28px 22px; text-align:center; box-shadow:0 24px 50px rgba(0,0,0,.28); }
#join-card h2 { font-family:'Fredoka One',cursive; font-size:1.55rem; color:var(--blued); margin-bottom:6px; }
#join-card p { color:#607D8B; font-weight:800; font-size:.92rem; margin-bottom:16px; }
#player-name { width:100%; border:2px solid var(--border); border-radius:14px; padding:14px 16px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:900; text-align:center; outline:none; margin-bottom:12px; }
#player-name:focus { border-color:var(--bluel); box-shadow:0 0 0 4px rgba(30,136,229,.12); }
#join-btn { width:100%; border:none; border-radius:16px; padding:14px 18px; font-family:'Fredoka One',cursive; font-size:1.02rem; color:white; background:linear-gradient(135deg,var(--blue),var(--blued)); cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,.18); }
#join-help { margin-top:10px; min-height:1.1em; font-size:.8rem; font-weight:900; color:#C62828; }
#player-chip { margin-top:4px; font-size:.75rem; font-weight:900; color:rgba(255,255,255,.95); display:none; }

</style>
</head>
<body>

<div id="join-overlay">
  <div id="join-card">
    <h2>🔵 Equipo Azul</h2>
    <p>Escribe tu nombre para entrar con tu pirata.</p>
    <input id="player-name" maxlength="18" placeholder="Tu nombre" autocomplete="nickname">
    <button id="join-btn" type="button">Entrar al juego</button>
    <div id="join-help"></div>
  </div>
</div>

<div id="header">
  <h1>🔵 Equipo 1</h1>
  <div id="conn-status">Esperando nombre...</div>
  <div id="player-chip"></div>
</div>

<div id="score-bar">
  <div class="sc-chip b">🔵 <span id="sb">0</span></div>
  <div class="sc-chip r">🔴 <span id="sr">0</span></div>
</div>

<div id="qbox">
  <div id="qlabel">RESUELVE</div>
  <div id="qtext">...</div>
</div>

<div id="tbar-wrap"><div id="tbar"></div></div>
<div id="timer-num">38</div>

<div id="ans-box">
  <div id="ans-val">?</div>
</div>

<div id="fb"> </div>

<div id="numpad">
  <button class="nb" onclick="np('1')">1</button>
  <button class="nb" onclick="np('2')">2</button>
  <button class="nb" onclick="np('3')">3</button>
  <button class="nb" onclick="np('4')">4</button>
  <button class="nb" onclick="np('5')">5</button>
  <button class="nb" onclick="np('6')">6</button>
  <button class="nb" onclick="np('7')">7</button>
  <button class="nb" onclick="np('8')">8</button>
  <button class="nb" onclick="np('9')">9</button>
  <button class="nb zero" onclick="np('0')">0</button>
  <button class="nb del"  onclick="del()">⌫</button>
  <button class="nb ok"   onclick="sub()">✓ OK</button>
</div>

<div id="over-overlay">
  <div id="over-emoji">🏁</div>
  <div id="over-title">¡Juego terminado!</div>
  <div id="over-sub">El profesor iniciará una nueva partida</div>
</div>

<script>
const TEAM = 'b';
const TS   = 38;
let ws, buf = '';
let playerName = '';
const playerId = sessionStorage.getItem('tm_player_id') || ('p_' + Math.random().toString(36).slice(2));
sessionStorage.setItem('tm_player_id', playerId);

let pingInterval = null;

let suppressClickUntil = 0;

function initFastPad() {
  const buttons = document.querySelectorAll('#numpad button[onclick]');
  buttons.forEach((btn) => {
    const action = btn.getAttribute('onclick');
    btn.removeAttribute('onclick');

    const run = () => {
      if (action.startsWith("np('")) {
        np(action.match(/np\('(.+?)'\)/)[1]);
      } else if (action.startsWith('del(')) {
        del();
      } else if (action.startsWith('sub(')) {
        sub();
      }
    };

    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      suppressClickUntil = Date.now() + 400;
      run();
    }, { passive: false });

    btn.addEventListener('click', (e) => {
      if (Date.now() < suppressClickUntil) {
        e.preventDefault();
        return;
      }
      run();
    });
  });
}


function setJoinHelp(msg) { document.getElementById('join-help').textContent = msg || ''; }
function updatePlayerChip() {
  const chip = document.getElementById('player-chip');
  if (!playerName) { chip.style.display = 'none'; return; }
  chip.style.display = 'block';
  chip.textContent = '🧑‍💻 ' + playerName;
}
function tryJoin() {
  const input = document.getElementById('player-name');
  const value = input.value.replace(/\s+/g,' ').trim().slice(0,18);
  if (!value) { setJoinHelp('Escribe tu nombre para entrar.'); input.focus(); return; }
  playerName = value;
  localStorage.setItem('tm_name_blue', playerName);
  document.getElementById('join-overlay').style.display = 'none';
  updatePlayerChip();
  connectWS();
}
document.getElementById('join-btn').addEventListener('click', tryJoin);
document.getElementById('player-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryJoin(); });
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('tm_name_blue') || '';
  const input = document.getElementById('player-name');
  input.value = saved;
  input.focus();
  input.select();
});

function connectWS() {
  const host = window.location.host;
  const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
  ws = new WebSocket(protocol + host);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type:'register', role:'blue', id: playerId, name: playerName }));
    setStatus('✅ Conectado', true);
    // Heartbeat para mantener la conexión viva en Render
    clearInterval(pingInterval);
    pingInterval = setInterval(() => {
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type:'ping' }));
    }, 10000);
  };

  ws.onmessage = (e) => { try { handle(JSON.parse(e.data)); } catch(err) {} };

  ws.onerror = () => { ws.close(); };

  ws.onclose = () => {
    clearInterval(pingInterval);
    setStatus('🔄 Reconectando...', false);
    setTimeout(connectWS, 1500);
  };
}

// Reconectar si la pestaña vuelve a ser visible
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && (!ws || ws.readyState !== 1)) {
    connectWS();
  }
});

function send(obj) { if(ws && ws.readyState===1) ws.send(JSON.stringify(obj)); }

function handle(msg) {
  switch(msg.type) {
    case 'state':
      document.getElementById('qtext').textContent = msg.qtext;
      document.getElementById('sb').textContent = msg.sb;
      document.getElementById('sr').textContent = msg.sr;
      buf = msg.ib || '';
      document.getElementById('ans-val').textContent = buf || '?';
      updateTimer(msg.timer);
      break;
    case 'pause':
      const po = document.getElementById('pause-overlay');
      if (msg.paused) po.classList.add('show');
      else po.classList.remove('show');
      break;

    case 'hostLeft':
      document.getElementById('pause-title').textContent = 'Sesión terminada';
      document.getElementById('pause-sub').textContent = 'El profesor cerró el juego';
      document.getElementById('pause-emoji').textContent = '🏴‍☠️';
      document.getElementById('pause-overlay').classList.add('show');
      break;

    case 'timer':
      updateTimer(msg.value);
      break;
    case 'timeout':
      showFb('⏱ ¡Tiempo!', '');
      setTimeout(() => showFb(' ',''), 900);
      break;
    case 'nextQ':
      const el = document.getElementById('qtext');
      el.classList.add('fade');
      setTimeout(() => { el.textContent = msg.qtext; el.classList.remove('fade'); }, 200);
      buf = '';
      document.getElementById('ans-val').textContent = '?';
      showFb(' ','');
      break;
    case 'input':
      // Ignorar eco propio — display ya es local e instantáneo
      break;
    case 'clearInput':
      if (msg.team === TEAM) { buf=''; document.getElementById('ans-val').textContent='?'; }
      break;
    case 'correct':
      document.getElementById('sb').textContent = msg.sb;
      document.getElementById('sr').textContent = msg.sr;
      if (msg.team === TEAM) { showFb('✅ ¡Correcto!','ok'); setTimeout(()=>showFb(' ',''),900); }
      break;
    case 'wrong':
      if (msg.team === TEAM) { showFb('❌ Incorrecto','w'); setTimeout(()=>showFb(' ',''),1300); }
      break;
    case 'win':
      document.getElementById('over-overlay').classList.add('show');
      document.getElementById('over-emoji').textContent = msg.team===TEAM ? '🥇' : '😔';
      document.getElementById('over-title').textContent = msg.team===TEAM ? '¡Ganaron!' : 'Perdieron...';
      break;
    case 'restart':
      document.getElementById('over-overlay').classList.remove('show');
      buf = '';
      document.getElementById('ans-val').textContent = '?';
      document.getElementById('sb').textContent = '0';
      document.getElementById('sr').textContent = '0';
      const qt = document.getElementById('qtext');
      qt.classList.add('fade');
      setTimeout(()=>{ qt.textContent=msg.qtext; qt.classList.remove('fade'); },200);
      showFb(' ','');
      break;
  }
}

function np(d) {
  // Mostrar inmediatamente sin esperar al servidor
  if (buf.length < 4) {
    buf += d;
    document.getElementById('ans-val').textContent = buf || '?';
  }
  send({ type:'input', team:TEAM, digit:d });
}
function del() {
  buf = buf.slice(0, -1);
  document.getElementById('ans-val').textContent = buf || '?';
  send({ type:'delete', team:TEAM });
}
function sub()  { send({ type:'submit', team:TEAM }); }

// Soporte de teclado físico
document.addEventListener('keydown', (e) => {
  if (e.key >= '0' && e.key <= '9') { np(e.key); e.preventDefault(); }
  else if (e.key === 'Backspace')    { del(); e.preventDefault(); }
  else if (e.key === 'Enter')        { sub(); e.preventDefault(); }
});

function updateTimer(v) {
  const el = document.getElementById('timer-num');
  document.getElementById('tbar').style.width = (v/TS*100)+'%';
  el.textContent = v;
  if(v<=8) el.className='urgent';
  else if(v<=15) el.className='ok';
  else el.className='';
}

function showFb(msg, cls) {
  const e = document.getElementById('fb');
  e.textContent = msg;
  e.className = cls || '';
}

function setStatus(txt, ok) {
  const e = document.getElementById('conn-status');
  e.textContent = txt;
  e.className = ok ? 'ok' : '';
}

window.addEventListener('load', () => {
  initFastPad();
});
</script>

<div id="pause-overlay">
  <div id="pause-card">
    <div id="pause-emoji">⏸️</div>
    <div id="pause-title">Juego en Pausa</div>
    <div id="pause-sub">Esperando al profesor...</div>
  </div>
</div>
</body>
</html>
